name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Validate CLI entrypoints
        run: |
          python -m bcp --help > /dev/null
          bcp map . bcp/signature_indexer.py --depth 1 > /dev/null

      - name: Run benchmark smoke test
        run: python bench.py . bcp/signature_indexer.py
